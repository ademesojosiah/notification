name: Deploy Backend Service

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env.properties
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.PROD_ENV }}" > src/main/resources/env.properties

      - name: Stop old container
        run: docker rm -f hireflow-notification-service || true

      - name: Remove old image
        run: docker rmi hireflow-notification-service || true

      - name: Build Docker image
        run: docker build -t hireflow-notification-service .

      - name: Ensure Docker network exists
        run: |
          docker network inspect hireflow-network >/dev/null 2>&1 || \
          docker network create hireflow-network

      - name: Start backend container
        run: |
          docker run -d \
            --name hireflow-notification-service \
            --network hireflow-network \
            -p 8081:8081 \
            --restart unless-stopped \
            hireflow-notification-service

      - name: Cleanup dangling images
        run: docker image prune -f
